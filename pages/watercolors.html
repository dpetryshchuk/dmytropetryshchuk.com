<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="../styles.css">
    <title>Watercolors - Dmytro Petryshchuk</title>
    <style>
        .g-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }

        @media (max-width: 768px) {
            .g-grid {
                grid-template-columns: 1fr;
            }
        }

        .g-item {
            display: flex;
            flex-direction: column;
        }

        .g-frame {
            background: #f8f3ec;
            padding: 1.1rem;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            line-height: 0;
        }

        .g-frame img {
            display: block;
            width: 100%;
            height: 280px;
            object-fit: cover;
            cursor: zoom-in;
        }

        .g-caption {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            padding: 0.85rem 0 0;
        }

        .g-num {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: #3a3a3a;
            flex-shrink: 0;
        }

        .g-name {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            color: #888;
            letter-spacing: 0.05em;
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            cursor: zoom-out;
        }

        .lightbox.open {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-img {
            max-width: 90vw;
            max-height: 88vh;
            object-fit: contain;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 768px) {
            .g-frame img {
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <nav>
            <a href="../index.html">home</a>
            <span class="nav-sep">·</span>
            <a href="writings.html">writings</a>
            <span class="nav-sep">·</span>
            <a href="library.html">library</a>
            <span class="nav-sep">·</span>
            <a href="watercolors.html">watercolors</a>
        </nav>
        <h1>Watercolors</h1>

        <div class="g-grid">
            <figure class="g-item">
                <div class="g-frame">
                    <img src="../sources/imgs/basecampmoon-desktop.jpg" alt="Basecamp Moon">
                </div>
                <figcaption class="g-caption">
                    <span class="g-num">01</span>
                    <span class="g-name">Basecamp Moon</span>
                </figcaption>
            </figure>

            <figure class="g-item">
                <div class="g-frame">
                    <img src="../sources/imgs/california-desktop.jpg" alt="California">
                </div>
                <figcaption class="g-caption">
                    <span class="g-num">02</span>
                    <span class="g-name">California</span>
                </figcaption>
            </figure>

            <figure class="g-item">
                <div class="g-frame">
                    <img src="../sources/imgs/finland-desktop.jpg" alt="Finland">
                </div>
                <figcaption class="g-caption">
                    <span class="g-num">03</span>
                    <span class="g-name">Finland</span>
                </figcaption>
            </figure>

            <figure class="g-item">
                <div class="g-frame">
                    <img src="../sources/imgs/sweden-desktop.jpg" alt="Sweden">
                </div>
                <figcaption class="g-caption">
                    <span class="g-num">04</span>
                    <span class="g-name">Sweden</span>
                </figcaption>
            </figure>
        </div>
    </main>

    <div class="lightbox" id="lightbox">
        <img class="lightbox-img" id="lightbox-img" src="" alt="">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        document.querySelectorAll('.g-frame img').forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightboxImg.alt = img.alt;
                lightbox.classList.add('open');
            });
        });

        lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') lightbox.classList.remove('open');
        });
    </script>
    <script data-goatcounter="https://dima.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
</body>
</html>
